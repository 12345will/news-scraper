name: Daily news scrape

on:
  schedule:
    # GitHub cron is in UTC. 13:00 UTC ≈ 9:00 AM US Eastern during summer (EDT).
    # In winter (EST) this fires at 8:00 AM Eastern. Change to "0 14 * * *" if you
    # want a steady 9:00 AM in winter. Day-of-the-week/month fields are * (every day).
    - cron: "0 13 * * *"
  workflow_dispatch:   # adds a "Run workflow" button so you can trigger it by hand

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # lets the job commit the updated CSV back to the repo
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scraper
        run: python scrape_news.py

      - name: Commit the updated log
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add news_log.csv
          git diff --staged --quiet || git commit -m "Update news log ($(date -u +%Y-%m-%d))"
          git push
