name: Daily News Scraper

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python news_scraper.py

      - name: Commit updated news files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add news_log.csv news_log.xlsx
          git diff --cached --quiet || git commit -m "Update daily news log"
          git push
